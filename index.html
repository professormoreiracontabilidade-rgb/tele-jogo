<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Telejogo Tela Cheia - Professor Moreira</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Arial,sans-serif;touch-action:none;user-select:none}
body{position:fixed;inset:0}
.game{position:fixed;inset:0;background:#000;overflow:hidden}
canvas{position:absolute;inset:0;width:100vw;height:100vh;background:#000;image-rendering:pixelated}
.hud{position:absolute;top:0;left:0;right:0;height:46px;background:rgba(0,0,0,.72);border-bottom:2px solid #fff;display:flex;align-items:center;justify-content:space-between;padding:3px 7px;z-index:5}
.logo{font-size:12px;font-weight:900;letter-spacing:1px;line-height:1.05}.logo small{display:block;font-size:7px;opacity:.75}
.score{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:36px;font:900 27px monospace}
.menu{display:flex;gap:4px}.menu select,.menu button{height:24px;background:#000;color:#fff;border:1.5px solid #fff;border-radius:7px;font-size:8px;font-weight:900;padding:0 4px}
.touch{position:absolute;z-index:7;width:78px;height:78px;border:3px solid #fff;background:rgba(255,255,255,.08);color:#fff;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;backdrop-filter:blur(3px)}
.touch:active,.touch.active{background:#fff;color:#000}.left-up{left:6px;bottom:98px}.left-down{left:6px;bottom:12px}.right-up{right:6px;bottom:98px}.right-down{right:6px;bottom:12px}
.center{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:8;display:flex;gap:8px}.center button{width:64px;height:34px;background:#fff;color:#000;border:0;border-radius:11px;font-size:10px;font-weight:900;box-shadow:0 4px 0 #777}.center button:active{transform:translateY(3px);box-shadow:0 1px 0 #777}
.message{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;pointer-events:none;z-index:6;font-size:27px;font-weight:900;letter-spacing:3px;text-shadow:0 0 14px #fff;opacity:0;transition:.2s}.message.show{opacity:1}
.crt:before{content:"";position:absolute;inset:0;pointer-events:none;z-index:12;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.05) 0,rgba(255,255,255,.05) 1px,transparent 2px,transparent 4px);opacity:.16}
.crt:after{content:"";position:absolute;inset:0;pointer-events:none;z-index:13;box-shadow:inset 0 0 50px rgba(255,255,255,.08), inset 0 0 120px rgba(0,0,0,.9)}
@media (min-width:600px){.hud{height:54px}.logo{font-size:16px}.logo small{font-size:9px}.score{font-size:34px;gap:52px}.menu select,.menu button{height:30px;font-size:10px}.touch{width:92px;height:92px;font-size:42px}.left-up{left:12px;bottom:116px}.left-down{left:12px;bottom:16px}.right-up{right:12px;bottom:116px}.right-down{right:12px;bottom:16px}.center button{width:82px;height:38px;font-size:12px}}
@media (orientation:landscape){.touch{width:72px;height:72px;font-size:32px}.left-up{left:10px;bottom:84px}.left-down{left:10px;bottom:8px}.right-up{right:10px;bottom:84px}.right-down{right:10px;bottom:8px}.center{bottom:10px}}
</style>
</head>
<body>
<div class="game crt">
<canvas id="c"></canvas>
<div class="hud"><div class="logo">TELEJOGO<small>PROFESSOR MOREIRA</small></div><div class="score"><span id="p1">00</span><span id="p2">00</span></div><div class="menu"><select id="mode"><option value="ai">1P</option><option value="pvp">2P</option></select><select id="points"><option value="10">10</option><option value="15" selected>15</option><option value="21">21</option></select><button id="sound">🔊</button></div></div>
<div class="message show" id="msg">APERTE INICIAR</div>
<div class="touch left-up" data-key="w">▲</div><div class="touch left-down" data-key="s">▼</div><div class="touch right-up" data-key="ArrowUp">▲</div><div class="touch right-down" data-key="ArrowDown">▼</div>
<div class="center"><button id="start">INICIAR</button><button id="reset">ZERAR</button></div>
</div>
<script>
const canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),p1El=document.getElementById("p1"),p2El=document.getElementById("p2"),msg=document.getElementById("msg"),modeEl=document.getElementById("mode"),pointsEl=document.getElementById("points"),soundBtn=document.getElementById("sound");
let W=innerWidth,H=innerHeight,playTop=46,keys={},running=false,paused=true,muted=false,last=0,score1=0,score2=0,left={},right={},ball={};
function viewport(){W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*devicePixelRatio);canvas.height=Math.floor(H*devicePixelRatio);ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);playTop=innerWidth>=600?54:46;if(!running)resetPositions()}
addEventListener("resize",viewport);addEventListener("orientationchange",()=>setTimeout(viewport,200));
function ph(){return Math.max(108,Math.min(160,H*.23))}
function resetPositions(dir=Math.random()>.5?1:-1){let h=ph();left={x:22,y:H/2-h/2,w:13,h};right={x:W-35,y:H/2-h/2,w:13,h};let sp=Math.max(340,Math.min(540,W*.95));ball={x:W/2,y:H/2,r:Math.max(9,Math.min(15,W*.03)),speed:sp,vx:dir*sp,vy:(Math.random()*.8-.4)*320}}
function show(t,time=900){msg.textContent=t;msg.classList.add("show");clearTimeout(show.t);if(time!==999999)show.t=setTimeout(()=>msg.classList.remove("show"),time)}
let ac=null;function beep(f=500,d=.05,type="square"){if(muted)return;ac=ac||new(AudioContext||webkitAudioContext)();let o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=f;g.gain.value=.07;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.stop(ac.currentTime+d)}
function draw(){ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);ctx.fillStyle="#fff";ctx.fillRect(0,playTop,W,3);ctx.fillRect(0,H-3,W,3);for(let y=playTop+12;y<H;y+=25)ctx.fillRect(W/2-2,y,4,13);ctx.fillRect(left.x,left.y,left.w,left.h);ctx.fillRect(right.x,right.y,right.w,right.h);ctx.fillRect(ball.x-ball.r,ball.y-ball.r,ball.r*2,ball.r*2)}
function update(dt){let ms=Math.max(540,H*.78);if(keys.w)left.y-=ms*dt;if(keys.s)left.y+=ms*dt;if(modeEl.value==="pvp"){if(keys.ArrowUp)right.y-=ms*dt;if(keys.ArrowDown)right.y+=ms*dt}else{right.y+=(ball.y-right.h/2-right.y)*Math.min(1,dt*5.4)}left.y=Math.max(playTop+5,Math.min(H-left.h-5,left.y));right.y=Math.max(playTop+5,Math.min(H-right.h-5,right.y));ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;if(ball.y-ball.r<=playTop+5){ball.y=playTop+5+ball.r;ball.vy=Math.abs(ball.vy);beep(250,.035)}if(ball.y+ball.r>=H-5){ball.y=H-5-ball.r;ball.vy=-Math.abs(ball.vy);beep(250,.035)}hit(left,1);hit(right,-1);if(ball.x<-30){score2++;updateScore();point(-1)}if(ball.x>W+30){score1++;updateScore();point(1)}}
function hit(p,dir){if(ball.x+ball.r>p.x&&ball.x-ball.r<p.x+p.w&&ball.y+ball.r>p.y&&ball.y-ball.r<p.y+p.h&&Math.sign(ball.vx)!==dir){let rel=(ball.y-(p.y+p.h/2))/(p.h/2);ball.speed=Math.min(ball.speed+15,720);ball.vx=dir*ball.speed;ball.vy=rel*ball.speed*.82;ball.x=dir>0?p.x+p.w+ball.r:p.x-ball.r;beep(660,.045)}}
function point(dir){beep(120,.16,"sawtooth");let max=+pointsEl.value;if(score1>=max||score2>=max){running=false;paused=true;show(score1>score2?"JOGADOR 1 VENCEU":"JOGADOR 2 VENCEU",999999);return}show("PONTO!",650);resetPositions(dir)}
function updateScore(){p1El.textContent=String(score1).padStart(2,"0");p2El.textContent=String(score2).padStart(2,"0")}
function loop(t){let dt=Math.min(.033,(t-last)/1000||0);last=t;if(running&&!paused)update(dt);draw();requestAnimationFrame(loop)}
function start(){if(!running){score1=0;score2=0;updateScore();resetPositions();running=true}paused=false;show("VALENDO!",500);beep(900,.07)}
function reset(){score1=0;score2=0;updateScore();running=false;paused=true;resetPositions();show("APERTE INICIAR",999999)}
document.getElementById("start").onclick=start;document.getElementById("reset").onclick=reset;modeEl.onchange=reset;pointsEl.onchange=reset;soundBtn.onclick=()=>{muted=!muted;soundBtn.textContent=muted?"🔇":"🔊"};
addEventListener("keydown",e=>{if(["w","s","ArrowUp","ArrowDown"," "].includes(e.key))e.preventDefault();if(e.key===" ")start();keys[e.key]=true});addEventListener("keyup",e=>keys[e.key]=false);
document.querySelectorAll(".touch").forEach(b=>{let k=b.dataset.key;let down=e=>{e.preventDefault();keys[k]=true;b.classList.add("active")};let up=e=>{e.preventDefault();keys[k]=false;b.classList.remove("active")};b.addEventListener("pointerdown",down);b.addEventListener("pointerup",up);b.addEventListener("pointercancel",up);b.addEventListener("pointerleave",up)});
viewport();reset();requestAnimationFrame(loop);
</script>
</body>
</html>
